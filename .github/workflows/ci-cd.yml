name: Frontend-Only CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Frontend Build & Deploy
  frontend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        yarn install --frozen-lockfile || yarn install
      
    - name: Build frontend
      run: |
        CI=false yarn build
        ls -la build/
        echo "Checking if index.html exists..."
        test -f build/index.html && echo "✅ index.html created successfully!" || echo "❌ index.html not found!"
      env:
        CI: false
      
    - name: Upload frontend build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/
        retention-days: 7
        if-no-files-found: error

  # Deploy (optional - configure when ready)
  deploy:
    needs: [frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download frontend build artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/
        
    - name: Verify build files
      run: |
        echo "Checking downloaded build files..."
        ls -la frontend/build/
        test -f frontend/build/index.html && echo "✅ index.html found!" || echo "❌ index.html missing!"
        
    # Uncomment to deploy via FTP
    # - name: FTP Deploy
    #   uses: SamKirkland/FTP-Deploy-Action@v4.3.4
    #   with:
    #     server: ${{ secrets.FTP_SERVER }}
    #     username: ${{ secrets.FTP_USERNAME }}
    #     password: ${{ secrets.FTP_PASSWORD }}
    #     local-dir: ./frontend/build/
    #     server-dir: /public_html/
    
