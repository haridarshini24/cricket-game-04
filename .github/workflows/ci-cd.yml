name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Frontend Tests & Build
  frontend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        yarn install --frozen-lockfile || yarn install
      
    - name: Create environment file
      run: |
        echo "REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL || 'http://localhost:8001' }}" > .env.production
        cat .env.production
      
    - name: Build frontend
      run: |
        CI=false yarn build
        ls -la build/
        echo "Checking if index.html exists..."
        test -f build/index.html && echo "✅ index.html created successfully!" || echo "❌ index.html not found!"
      env:
        CI: false
        REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'http://localhost:8001' }}
      
    - name: Upload frontend build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/
        retention-days: 7
        if-no-files-found: error

  # Backend Tests
  backend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint backend code (optional)
      continue-on-error: true
      run: |
        pip install flake8 || true
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,__pycache__ || echo "Linting completed with warnings"
        
    - name: Check Python syntax
      run: |
        python -m py_compile server.py
        echo "✅ Backend syntax is valid!"

  # Deploy to hosting (example for VPS/Cloud)
  deploy:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download frontend build artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/
        
    - name: Verify build files
      run: |
        echo "Checking downloaded build files..."
        ls -la frontend/build/
        test -f frontend/build/index.html && echo "✅ index.html found in artifacts!" || echo "❌ index.html missing!"
        
